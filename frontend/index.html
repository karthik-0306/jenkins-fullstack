<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Full-Stack CI/CD Dashboard</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #1e1e1e;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            width: 400px;
            text-align: center;
        }

        h1 {
            color: #bb86fc;
            margin-bottom: 1.5rem;
        }

        .info-group {
            margin: 10px 0;
            font-size: 1.1rem;
        }

        .label {
            color: #03dac6;
            font-weight: bold;
        }

        .api-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #2c2c2c;
            border-radius: 8px;
            border-left: 4px solid #bb86fc;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Student Profile</h1>
        <div class="info-group">
            <span class="label">Name:</span> Thota Sai Karthik
        </div>
        <div class="info-group">
            <span class="label">Roll Number:</span> 2023bcs0159
        </div>

        <div class="api-box">
            <div id="api-status">📡 Fetching Backend API...</div>
            <div id="api-data" style="margin-top: 10px; color: #bb86fc;"></div>
        </div>
    </div>

    <script>
        async function fetchDetails() {
            try {
                // Fetching from backend as required by Task 1.2
                const response = await fetch('http://localhost:5000/student-details');
                const data = await response.json();

                document.getElementById('api-status').innerText = "✅ API Connected";
                document.getElementById('api-data').innerHTML = `
                    Fetched Name: ${data.name}<br>
                    Fetched Roll: ${data.roll_number}
                `;
            } catch (error) {
                document.getElementById('api-status').innerText = "❌ Backend Unreachable";
                console.error('Error:', error);
            }
        }
        fetchDetails();
    </script>
</body>

</html>
